name: main
on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main

jobs:
  test:
    runs-on: namespace-profile-linux-amd64-8cpu-16gb
    env:
      MISE_ENV_FILE: .env.ci
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: hackerspub
        ports:
        - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d hackerspub"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:8-alpine
        ports:
        - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
    - uses: actions/checkout@v4
    - uses: jdx/mise-action@v4
      with:
        experimental: true
        cache: true
        cache_key_prefix: mise-v4
    - name: Run codegen
      run: mise run codegen
    - name: Build web-next
      run: mise run build:web-next
    - name: Validate standalone Compose topology
      run: docker compose --env-file .env.ci config --quiet
    - name: Run database migrations
      run: mise run migrate
    - name: Smoke test standalone services
      run: mise run smoke:standalone
    - name: Run tests
      if: always()
      run: mise run test
    - name: Run checks
      if: always()
      run: mise run check
    - name: Typecheck asset-cdn Worker
      if: always()
      # asset-cdn is excluded from `mise run check` (it targets the Cloudflare
      # Workers runtime, not Deno), so type-check it with its own tsc.
      run: pnpm --filter @hackerspub/asset-cdn typecheck
    - name: Check for untranslated messages
      if: always()
      run: |
        cd web-next/src/locales
        has_untranslated=false
        for file in */messages.po; do
          echo "Checking $file..."
          while IFS= read -r line; do
            if [ -n "$line" ]; then
              line_num=$(echo "$line" | cut -d: -f1)
              msgid=$(echo "$line" | cut -d: -f2-)
              echo "::error file=web-next/src/locales/$file,line=$line_num::Untranslated message: $msgid"
              has_untranslated=true
            fi
          done < <(awk '/^msgid/ && !/^msgid ""$/ { msgid = $0; getline; while (/^"/) getline; if (/^msgstr ""$/) print NR ": " msgid }' "$file")

          if [ "$has_untranslated" = false ]; then
            echo "✅ All messages translated in $file"
          fi
        done
        if [ "$has_untranslated" = true ]; then
          echo "::error::Found untranslated messages in .po files. Please translate all messages before merging."
          exit 1
        fi
    - name: Extract web-next translations
      if: always()
      run: mise run next:extract
    - name: Check for uncommitted changes
      if: always()
      run: |
        has_changes=false

        # Non-.po files: byte-for-byte git diff (covers schema.graphql etc.)
        while IFS= read -r file; do
          echo "::error file=$file::Generated file has uncommitted changes - please run generators locally and commit"
          git diff --unified=0 "$file" | grep '^@@' | while read -r hunk; do
            line_info=${hunk#*+}
            line_info=${line_info%%,*}
            line_info=${line_info%% *}
            [ -n "$line_info" ] && echo "::error file=$file,line=$line_info::Generated content differs from committed version"
          done
          has_changes=true
        done < <(git diff --name-only -- ':!*.po')

        # .po files: semantic comparison via proper parser
        # Ignores volatile-but-non-semantic changes (#: location comments,
        # #. placeholder notes, POT-Creation-Date) caused by line number shifts.
        mapfile -t changed_po < <(git diff --name-only -- '*.po')
        if [ "${#changed_po[@]}" -gt 0 ]; then
          if ! deno run --allow-read --allow-run=git scripts/check-po-changes.ts "${changed_po[@]}"; then
            has_changes=true
          fi
        fi

        if [ "$has_changes" = "true" ]; then
          echo "::error::Generated files have uncommitted changes. Please run the generators locally and commit the changes."
          exit 1
        fi

  image:
    needs: [test]
    permissions:
      contents: read
      packages: write
      attestations: write
    strategy:
      matrix:
        os:
        - namespace-profile-linux-amd64-8cpu-16gb
        - namespace-profile-linux-arm64-8cpu-16gb
    runs-on: ${{ matrix.os }}
    steps:
    - uses: docker/setup-buildx-action@v3
    - uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}
    - id: arch
      run: |
        set -ex
        if [[ "$RUNNER_ARCH" = "ARM64" ]]; then
          echo arch=arm64 >> "$GITHUB_OUTPUT"
        else
          echo arch=amd64 >> "$GITHUB_OUTPUT"
        fi
    - if: github.event_name == 'push'
      uses: docker/build-push-action@v6
      with:
        pull: "true"
        push: "true"
        no-cache: "false"
        build-args:
          GIT_COMMIT=${{ github.sha }}
        # Pipe the Sentry auth token in as a BuildKit secret so the
        # `RUN --mount=type=secret,id=sentry_auth_token,...` step in the
        # Dockerfile can read it during the web-next build (for source-map
        # upload via @sentry/vite-plugin) without the token ever being
        # baked into an image layer. Only set on push builds — fork PRs
        # don't get repo secrets, and PR builds don't need to upload
        # their source maps to Sentry.
        secrets: |
          github_token=${{ github.token }}
          sentry_auth_token=${{ secrets.SENTRY_AUTH_TOKEN }}
        tags: ghcr.io/${{ github.repository }}:git-${{ github.sha }}-${{ steps.arch.outputs.arch }}
        labels: |
          org.opencontainers.image.revision=${{ github.sha }}
        annotations: |
          org.opencontainers.image.title=Hackers' Pub
          org.opencontainers.image.description=ActivityPub-enabled social network for hackers
          org.opencontainers.image.url=https://hackers.pub/
          org.opencontainers.image.source=https://github.com/dahlia/hackerspub
          org.opencontainers.image.revision=${{ github.sha }}
          org.opencontainers.image.licenses=AGPL-3.0-only
        cache-from:
          type=registry,ref=ghcr.io/${{ github.repository }}:build-cache-${{ steps.arch.outputs.arch }}
        cache-to:
          type=registry,ref=ghcr.io/${{ github.repository }}:build-cache-${{ steps.arch.outputs.arch }},mode=max
        provenance: false
    - if: github.event_name == 'pull_request'
      uses: docker/build-push-action@v6
      with:
        pull: "true"
        push: "false"
        build-args:
          GIT_COMMIT=${{ github.sha }}
        secrets: |
          github_token=${{ github.token }}
        tags: ghcr.io/${{ github.repository }}:git-${{ github.sha }}-${{ steps.arch.outputs.arch }}
        labels: |
          org.opencontainers.image.revision=${{ github.sha }}
        annotations: |
          org.opencontainers.image.title=Hackers' Pub
          org.opencontainers.image.description=ActivityPub-enabled social network for hackers
          org.opencontainers.image.url=https://hackers.pub/
          org.opencontainers.image.source=https://github.com/dahlia/hackerspub
          org.opencontainers.image.revision=${{ github.sha }}
          org.opencontainers.image.licenses=AGPL-3.0-only
        cache-from:
          type=registry,ref=ghcr.io/${{ github.repository }}:build-cache-${{ steps.arch.outputs.arch }}
        provenance: false

  manifest:
    if: github.event_name == 'push'
    needs: [image]
    permissions:
      contents: read
      packages: write
      attestations: write
    runs-on: namespace-profile-linux-amd64-8cpu-16gb
    steps:
    - uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}
    - uses: Noelware/docker-manifest-action@0.4.2
      with:
        inputs: ghcr.io/${{ github.repository }}:git-${{ github.sha }},ghcr.io/${{ github.repository }}:latest
        images: ghcr.io/${{ github.repository }}:git-${{ github.sha }}-amd64,ghcr.io/${{ github.repository }}:git-${{ github.sha }}-arm64
        push: true

  # Mirror this build's content-hashed client assets to Cloudflare R2 so the
  # asset-cdn Worker (see asset-cdn/) can keep serving older deploys' route
  # chunks after the container image (which carries only the current build) is
  # replaced. This is what prevents Sentry WEB-NEXT-C
  # ("error loading dynamically imported module") for tabs that outlive a
  # deploy. We pull the assets out of the already-built amd64 image rather than
  # rebuilding, so they are byte-for-byte what production serves (the Docker
  # build stamps the version into the bundle, changing hashes vs. the `test`
  # job's build). Assets are architecture-independent, so amd64 alone suffices.
  #
  # Dormant until the R2_ASSET_UPLOAD repo variable is set to "true", so this
  # is a no-op until the bucket and credentials exist. See asset-cdn/README.md.
  upload-assets:
    if: github.event_name == 'push' && vars.R2_ASSET_UPLOAD == 'true'
    needs: [image]
    permissions:
      contents: read
      packages: read
    runs-on: namespace-profile-linux-amd64-8cpu-16gb
    steps:
    - uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}
    - name: Extract built client assets from the image
      env:
        IMAGE: ghcr.io/${{ github.repository }}:git-${{ github.sha }}-amd64
      run: |
        set -euo pipefail
        cid="$(docker create "$IMAGE")"
        docker cp "$cid:/app/web-next/.output/public/_build" ./_build
        docker rm "$cid"
    - name: Upload to Cloudflare R2
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: auto
        R2_S3_ENDPOINT: ${{ secrets.R2_S3_ENDPOINT }}
        R2_BUCKET: ${{ vars.R2_BUCKET }}
      run: |
        set -euo pipefail
        # `sync` without `--delete`: upload newly added content-hashed files
        # and leave every previously uploaded object in place, so already-loaded
        # tabs never 404 on an old chunk. Hashed names make this safe (no churn
        # on unchanged files, no collisions across builds).
        aws s3 sync ./_build "s3://${R2_BUCKET}/_build" \
          --endpoint-url "$R2_S3_ENDPOINT" \
          --cache-control "public, max-age=31536000, immutable" \
          --no-progress
