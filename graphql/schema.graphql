  deleteOrphanMedia: DeleteOrphanMediaResult!
  deletePost(input: DeletePostInput!): DeletePostResult!
  finishMediumUpload(input: FinishMediumUploadInput!): FinishMediumUploadResult!
  followActor(input: FollowActorInput!): FollowActorResult!

