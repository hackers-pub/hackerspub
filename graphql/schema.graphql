"""
A local user account on this Hackers' Pub instance. Every `Account` has exactly one `Actor` (its public ActivityPub identity) and holds login credentials, settings, and moderation state. `Account` is only returned for the authenticated viewer and for moderator-only queries; all public identity data (name, bio, posts, followers) lives on `Actor`.
"""
type Account implements Node {
  actor: Actor!
  articleDrafts(after: String, before: String, first: Int, last: Int): AccountArticleDraftsConnection!

  """UUID of the medium used as this account's avatar."""
  avatarMediumId: UUID
  avatarUrl: URL! @deprecated(reason: "Use avatarMediumId instead.")
  bio: Markdown!
  created: DateTime!

  """
  The visibility applied to new notes when the user does not choose one explicitly at creation time.
  """
  defaultNoteVisibility: PostVisibility!

  """
  The visibility applied to new boosts/shares when the user does not choose one explicitly at creation time.
  """
  defaultShareVisibility: PostVisibility!

  """
  Full fediverse handle including the instance host, e.g., @alice@hackers.pub. Suitable for display and for cross-instance @-mention targeting.
  """
  handle: String!
  id: ID!
  invitationLinks: [InvitationLink!]!
  invitationsLeft: Int!
  invitees(after: String, before: String, first: Int, last: Int): AccountInviteesConnection!
  inviter: Account

  """
  The latest `published` timestamp across all posts authored by this account, or null when there are no posts.  Visible only to moderators.
  """
  lastPostPublished: DateTime
  links: [AccountLink!]!

  """
  The account's preferred display languages as BCP 47 tags. null means no preference has been set and all languages are shown.
  """
  locales: [Locale!]
  moderator: Boolean!
  name: String!
  notifications(after: String, before: String, first: Int, last: Int): AccountNotificationsConnection!
  ogImageUrl: URL!
  passkeys(after: String, before: String, first: Int, last: Int): AccountPasskeysConnection!

  """
  The total number of posts authored by this account.  Visible only to moderators; null otherwise.
  """
  postCount: Int

  """
  Whether to show LLM-generated article summaries by default. Only visible to the account holder and moderators.
  """
  preferAiSummary: Boolean!

  """
  Number of notifications created after the account's last `markNotificationsAsRead` call. Only visible to the account holder.
  """
  unreadNotificationsCount: Int!
  updated: DateTime!
  username: String!

  """
  When the username was last changed, or null if the username has never been changed from the original signup value.
  """
  usernameChanged: DateTime
  uuid: UUID!
}

