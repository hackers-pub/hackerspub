  completeLoginChallenge(
    """The code of the login challenge."""
    code: String!

    """The token of the login challenge."""
    token: UUID!
  ): Session

  """Complete the signup process by creating a new account and session."""
  completeSignup(
    """The verification code."""
    code: String!

    """The account creation data."""
    input: SignupInput!

    """The signup token."""
    token: UUID!
  ): SignupResult!
  createInvitationLink(expires: String, invitationsLeft: Int!, message: Markdown): CreateInvitationLinkResult!
  createMedium(input: CreateMediumInput!): CreateMediumResult!
  createNote(input: CreateNoteInput!): CreateNoteResult!
  deleteArticleDraft(input: DeleteArticleDraftInput!): DeleteArticleDraftResult!
  deleteInvitationLink(id: UUID!): DeleteInvitationLinkResult!

  """
  Delete unreferenced media older than the grace period.  Requires a moderator account.
