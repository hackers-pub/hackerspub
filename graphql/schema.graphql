"""
ActivityPub actor type as defined by the ActivityStreams 2.0 vocabulary. Most human accounts are `PERSON` actors.
"""
enum ActorType {
  """An application actor, typically the instance software itself."""
  APPLICATION

  """A group actor; posts addressed to the group are forwarded to members."""
  GROUP

  """An organization actor."""
  ORGANIZATION

  """A human user account."""
  PERSON

  """An automated service or bot account."""
  SERVICE
}

