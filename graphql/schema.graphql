    """Temporary session ID for passkey authentication."""
    sessionId: UUID!
  ): JSON!
  getPasskeyRegistrationOptions(accountId: ID!): JSON!
  invite(
    email: Email!
    locale: Locale!
    message: Markdown

    """
    The RFC 6570-compliant URI Template for the verification link.  Available variables: `{token}` and `{code}`.
    """
    verifyUrl: URITemplate!
  ): InviteResult!

  """
  Initiate passwordless email sign-in. Sends a magic link to the matching account's email address. The link embeds `{token}` and `{code}` as URI Template variables in `verifyUrl`. Complete the flow by calling `completeLoginChallenge` with those values.
  """
  loginByEmail(
    """The email of the account to sign in."""
    email: String!

    """The locale for the sign-in email."""
    locale: Locale!

    """
    The RFC 6570-compliant URI Template for the verification link.  Available variabvles: `{token}` and `{code}`.
    """
    verifyUrl: URITemplate!
  ): LoginResult!

  """
  Authenticate using a WebAuthn passkey. First call `getPasskeyAuthenticationOptions` with a fresh `sessionId` UUID, then pass the authenticator's response back here as `authenticationResponse`. Returns `null` when verification fails.
  """
  loginByPasskey(
    """WebAuthn authentication response from the client."""
    authenticationResponse: JSON!
    platform: String = "web"

    """Temporary session ID used for authentication options."""
    sessionId: UUID!
  ): Session

  """
  Initiate passwordless sign-in by username. Sends a magic link to all email addresses on the account. The link embeds `{token}` and `{code}` as URI Template variables in `verifyUrl`. Complete the flow by calling `completeLoginChallenge` with those values.
