"""
A stored media object (image). Two-step upload flow: call `startMediumUpload` to get a pre-signed upload URL, PUT the image to that URL, then call `finishMediumUpload` to complete the transaction. Alternatively, call `createMedium` with a remote URL to import an image directly. Unreferenced media older than the grace period are deleted by the `deleteOrphanMedia` mutation.
"""
type Medium implements Node {
  """SHA-256 hash of the normalized stored content, if known."""
  contentHash: Sha256
  created: DateTime!

  """
  AI-generated alternative text for this medium. Requires authentication. Within the 2-hour upload window only the uploader may call this field; after the window expires any authenticated user may call it (the medium is either publicly referenced or pending orphan cleanup). Multiple uploaders of identical content each get independent ownership entries, so content-hash deduplication does not grant the later uploader access to the earlier one's window. High-complexity operation (cost 1000). The context argument is truncated server-side to 1000 characters.
  """
  generatedAltText(context: String, language: Locale!): String
  height: Int
  id: ID!

  """The medium's media type. Local uploads are stored as WebP."""
  type: MediaType!

  """Public URL for the stored medium."""
  url: URL!
  uuid: UUID!
  width: Int
}

