"""
An ActivityPub actor: the public identity used for federation. Actors can be local (originating from this instance, `local: true`) or federated (from another instance, `local: false`). Local actors have an associated `Account` that holds login credentials and settings; remote actors do not. When in doubt, use `Actor` for display and `Account` only for settings that belong to the authenticated viewer.
"""
type Actor implements Node {
  account: Account
  articles(after: String, before: String, first: Int, last: Int): ActorArticlesConnection!

  """
  If false, incoming follow requests must be manually approved. Pending follows appear with a `null` `accepted` timestamp in `ActorFollowersConnectionEdge` until the actor approves them.
  """
  automaticallyApprovesFollowers: Boolean!
  avatarInitials: String!
  avatarUrl: URL!
  bio: HTML

  """
  True if this actor has blocked the authenticated viewer. Always false for unauthenticated requests.
  """
  blocksViewer: Boolean!
  created: DateTime!
  fields: [ActorField!]!
  followees(after: String, before: String, first: Int, last: Int): ActorFolloweesConnection!
  followers(after: String, before: String, first: Int, last: Int): ActorFollowersConnection!

  """
  One-off check: does this actor follow the given actor? For the viewer-relative variant, use `viewerFollows` instead.
  """
  follows(followeeId: ID): Boolean!

  """
  True if this actor follows the authenticated viewer. Always false for unauthenticated requests.
  """
  followsViewer: Boolean!
  handle: String!
  handleHost: String!
  headerUrl: URL
  id: ID!
  instance: Instance
  instanceHost: String!

  """
  The actor's ActivityPub IRI: the canonical identifier used for federation. For local actors this is the `/ap/…` endpoint, not the human-readable profile URL. Compare with `url`, which is the web profile page.
  """
  iri: URL!

  """
  One-off check: is this actor followed by the given actor? For the viewer-relative variant, use `followsViewer` instead.
  """
  isFollowedBy(followerId: ID): Boolean!

  """
  True if this actor belongs to the currently authenticated viewer. Always false for unauthenticated requests.
  """
  isViewer: Boolean!
  latestPostUpdated: DateTime

  """
  True if this actor was created on this instance (has an associated local `Account`). False for actors fetched from remote fediverse instances via ActivityPub.
  """
  local: Boolean!
  name: HTML
  noteByUuid(uuid: UUID!): Note
  notes(after: String, before: String, first: Int, last: Int): ActorNotesConnection!
  pins(after: String, before: String, first: Int, last: Int): ActorPinsConnection!

  """
  Look up one of this actor's posts by any of its UUIDs. Resolves a match against any of the three UUIDs a post can carry: `Post.uuid` (the post row's PK), `Note.sourceId` (= `noteSourceTable.id`, set only on source-backed local notes), or the local article source's id. The canonical permalink in `Post.url` uses the source UUID for source-backed local posts; for everything else (federated remote posts, local share wrappers, Questions) the row PK is the only token they can be looked up by, and is what the web-next route uses. The OR-match here keeps both styles working. Returns null if no post matches.
  """
  postByUuid(
    """Any of `Post.uuid`, `Note.sourceId`, or the local article source's id."""
    uuid: UUID!
  ): Post
  posts(after: String, before: String, first: Int, last: Int): ActorPostsConnection!
  published: DateTime
  questions(after: String, before: String, first: Int, last: Int): ActorQuestionsConnection!
  rawName: String
  sensitive: Boolean!
  sharedPosts(after: String, before: String, first: Int, last: Int): ActorSharedPostsConnection!

  """
  If this actor has migrated to a new account via the ActivityPub Move activity, points to the new actor. The old actor's posts are not automatically transferred to the new account.
  """
  successor: Actor
  type: ActorType!
  updated: DateTime!

  """
  The actor's human-readable profile URL. For local actors this is the web profile page, which differs from `iri` (the ActivityPub endpoint). `null` when the remote instance did not advertise one.
  """
  url: URL
  username: String!
  uuid: UUID!

  """
  True if the authenticated viewer has blocked this actor. Always false for unauthenticated requests.
  """
  viewerBlocks: Boolean!

  """
  True if the authenticated viewer follows this actor. Always false for unauthenticated requests or when the actor is the viewer themselves.
  """
  viewerFollows: Boolean!
}

