  loginByUsername(
    """The locale for the sign-in email."""
    locale: Locale!

    """The username of the account to sign in."""
    username: String!

    """
    The RFC 6570-compliant URI Template for the verification link.  Available variabvles: `{token}` and `{code}`.
    """
    verifyUrl: URITemplate!
  ): LoginResult!

  """
  Marks notifications as read up to a notification, or the current time when omitted. Returns the timestamp.
  """
  markNotificationsAsRead(
    """
    The UUID of the newest loaded notification to mark as read through.  When omitted, marks notifications read through the current time.
    """
    upTo: UUID
  ): DateTime!
  pinPost(input: PinPostInput!): PinPostResult!
  publishArticleDraft(input: PublishArticleDraftInput!): PublishArticleDraftResult!
  redeemInvitationLink(email: Email!, id: UUID!, locale: Locale!, verifyUrl: URITemplate!): RedeemInvitationLinkResult!

  """
