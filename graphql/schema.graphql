"""
A short-form microblog post, equivalent to a Mastodon Status or ActivityPub Note. Notes can be composed locally or federated in from remote instances. Boost wrappers (`sharedPost` is non-null) have empty content and copy the shared post's URL.
"""
type Note implements Node & Post & Reactable {
  actor: Actor!
  content: HTML!
  engagementStats: PostEngagementStats!
  excerpt: String!

  """
  A sanitized, truncated HTML preview of this post's content, clipped to roughly `maxChars` visible characters with valid tag structure preserved. Use this on feed cards instead of `content` to keep the rendered DOM small. Anchor tags are stripped — the surrounding card is expected to be the link to the full post. This does NOT fall back to `summary`; query `summary` separately when you want to display a real (e.g. LLM-generated) summary with its own affordances.
  """
  excerptHtml(maxChars: Int!): HTML!
  hashtags: [Hashtag!]!
  id: ID!
  iri: URL!
  language: String
  link: PostLink
  media: [PostMedium!]!
  mentions(after: String, before: String, first: Int, last: Int): PostMentionsConnection!
  name: String
  published: DateTime!
  quotePolicy: QuotePolicy!
  quoteTargetState: QuoteTargetState
  quotedPost: Post
  quotes(after: String, before: String, first: Int, last: Int): PostQuotesConnection!
  reactionGroup(customEmojiId: ID, emoji: String): ReactionGroup
  reactionGroups: [ReactionGroup!]!
  replies(after: String, before: String, first: Int, last: Int): PostRepliesConnection!
  replyTarget: Post
  sensitive: Boolean!
  sharedPost: Post
  shares(after: String, before: String, first: Int, last: Int): PostSharesConnection!

  """
  The local source UUID for this note — `noteSourceTable.id`, the identifier embedded in `Post.url` (`/@username/<sourceId>`). Non-null only for source-backed local notes (notes originally composed on this instance). Null for federated remote notes and for local share wrappers (boosts), since neither carries a `noteSourceTable` row; for those, fall back to `Post.uuid`.
  """
  sourceId: UUID
  summary: String
  updated: DateTime!

  """
  The canonical, human-readable URL of this post. For source-backed local posts the path encodes the local source identifier — `Note.sourceId` for notes, `Article.publishedYear` + `Article.slug` for articles — **not** `Post.uuid`. For federated remote posts and local share wrappers (boosts) this is whatever URL the originating instance advertised — copied from the shared post in the boost case — and is unrelated to the wrapper's own row PK. Prefer this field over hand-building a path from `Post.uuid`: `uuid` is the row PK and does not match the path here for source-backed local posts.
  """
  url: URL

  """
  The post row's primary key, stable for the lifetime of the post. ⚠️ This is **not** the UUID embedded in `Post.url` for source-backed local posts: local notes that originate here use `Note.sourceId` (= `noteSourceTable.id`) and local articles use `Article.publishedYear` + `Article.slug`. The row PK is the right token whenever there is no local source row — federated remote posts, local share wrappers (boosts, which carry no source and copy the shared post's URL), and Questions (whose originals come only from remote instances and whose local rows exist solely as share wrappers) — and for the internal route that resolves them. `actorByHandle.postByUuid` accepts either the row PK or a source UUID, but resolving by `uuid` for a source-backed local post yields a URL that differs from `Post.url`.
  """
  uuid: UUID!
  viewerCanQuote: Boolean!
  viewerCanReply: Boolean!
  viewerCanRevokeQuote: Boolean!
  viewerCanShare: Boolean!
  viewerHasBookmarked: Boolean!
  viewerHasPinned: Boolean!
  viewerHasShared: Boolean!
  visibility: PostVisibility!
}

