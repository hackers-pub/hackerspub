x-application: &application
  build:
    context: .
    dockerfile: Dockerfile.dev
  # Forward every supported runtime option before mise dotenv loading is
  # disabled below.  Explicit Compose values still win for container-only
  # networking and shared filesystem paths.
  env_file:
  - path: .env
    required: false
  environment: &application-environment
    # Compose owns container networking; ignore the bind-mounted host .env.
    MISE_NO_ENV: "1"
    DATABASE_URL: postgresql://postgres:password@db:5432/hackerspub
    KV_URL: redis://redis:6379/0
    ORIGIN: ${ORIGIN:-http://localhost:8000}
    SECRET_KEY: ${SECRET_KEY}
    INSTANCE_ACTOR_KEY: ${INSTANCE_ACTOR_KEY}
    BEHIND_PROXY: ${BEHIND_PROXY:-false}
    DRIVE_DISK: ${DRIVE_DISK:-fs}
    # Keep filesystem storage on the bind mount shared by the API and worker.
    # Object-storage drivers ignore this value.
    FS_LOCATION: ./media
    MODE: ${MODE:-development}
    EMAIL_FROM: ${EMAIL_FROM:-admin@example.com}
    MAILGUN_KEY: ${MAILGUN_KEY}
    MAILGUN_REGION: ${MAILGUN_REGION}
    MAILGUN_DOMAIN: ${MAILGUN_DOMAIN}
    MAILGUN_FROM: ${MAILGUN_FROM}
    SENTRY_DSN: ${SENTRY_DSN}
    PLAUSIBLE: ${PLAUSIBLE:-false}
  volumes: &application-volumes
  - .:/app
  - /app/deps
  - /app/.cache
  - /app/.deno
  - ./web/media:/app/web/media:z

services:
  migration:
    <<: *application
    command: mise run migrate
    depends_on:
      db:
        condition: service_healthy

  graphql:
    <<: *application
    command: mise run dev:graphql
    ports:
    - "8080:8080"
    depends_on:
      migration:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "mise", "run", "prod:hc:graphql"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  graphql-worker:
    <<: *application
    command: mise run dev:graphql-worker
    environment:
      <<: *application-environment
      WORKER_HEALTH_FILE: /tmp/hackerspub-graphql-worker.health
    depends_on:
      migration:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "mise", "run", "prod:hc:graphql-worker"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  web-next:
    <<: *application
    command: sh -c "mise run next:codegen && mise run dev:web-next"
    environment:
      # This mapping replaces the inherited application environment.
      MISE_NO_ENV: "1"
      NO_WATCHMAN: "1"
      API_URL: http://graphql:8080/graphql
      BEHIND_PROXY: ${BEHIND_PROXY:-false}
      HOST: 0.0.0.0
      ORIGIN: ${ORIGIN}
      PLAUSIBLE: ${PLAUSIBLE:-false}
      SENTRY_DSN: ${SENTRY_DSN}
    ports:
    - "3000:3000"
    depends_on:
      graphql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "mise", "run", "prod:hc:web-next"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  gateway:
    image: caddy:2.10-alpine
    ports:
    - "8000:8000"
    volumes:
    - ./Caddyfile.dev:/etc/caddy/Caddyfile:ro,Z
    depends_on:
      graphql:
        condition: service_healthy
      web-next:
        condition: service_healthy

  app:
    <<: *application
    profiles: ["legacy"]
    command: mise run dev:web
    ports:
    - "8001:8000"
    depends_on:
      migration:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  db:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: hackerspub
    volumes:
    - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hackerspub"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
