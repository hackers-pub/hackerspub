[settings]
experimental = true

[tools]
deno = "2.7.4"
node = "24"
pnpm = "10.12.4"
"aqua:nushell/nushell" = "0.99.1"
"npm:@sentry/mcp-server" = "latest"
"github:joho/godotenv" = "latest"

[tools."github:dahlia/hongdown"]
version = "0.5.1"

[tools."github:dahlia/hongdown".platforms]
linux-x64 = "hongdown-*-x86_64-unknown-linux-musl.tar.bz2"
linux-arm64 = "hongdown-*-aarch64-unknown-linux-musl.tar.bz2"

[env]
_.file = ".env"

[hooks]
postinstall = [
  { run = "mise deps install" },
  { run = 'if (".git" | path exists) { mise generate git-pre-commit --write --task=check }', shell = "nu -c" },
]

[deps.pnpm]
auto = true

[deps.deno]
auto = true

[tasks.codegen]
description = "Generate all checked-in artifacts"
run = ["mise run codegen:deno", "mise run codegen:node"]

[tasks."codegen:deno"]
description = "Generate the GraphQL schema with Deno"
run = "deno task -r codegen"

[tasks."codegen:node"]
description = "Generate checked-in artifacts with Node.js"
run = [
  "node --import temporal-polyfill/global graphql/generate-schema.ts",
  "pnpm --filter @hackerspub/web-next codegen",
]

[tasks."deps:sync"]
description = "Generate the temporary Deno import map from the pnpm catalog"
run = "node scripts/sync-deno-imports.ts"

[tasks."deps:check"]
description = "Check that the Deno import map matches the pnpm catalog"
run = "node scripts/sync-deno-imports.ts --check"

[tasks."next:codegen"]
description = "Generate Relay artifacts for web-next"
run = "pnpm --filter @hackerspub/web-next codegen"

[tasks."next:extract"]
description = "Extract Lingui messages for web-next"
run = "pnpm extract"
dir = "web-next"

[tasks.check]
description = "Run formatting, linting, type checking, and generated artifact checks"
run = ["mise run check:node", "mise run check:deno"]

[tasks."check:node"]
description = "Run Node.js formatting, linting, type checking, and generated artifact checks"
depends = ["deps:check", "next:codegen"]
run = [
  "pnpm exec oxfmt --check .",
  "hongdown --check",
  "pnpm exec oxlint --config oxlint.config.ts --deny-warnings .",
  "pnpm exec tsc -p tsconfig.node.json",
  "pnpm exec tsc -p web-next/tsconfig.json",
  "pnpm exec tsc -p asset-cdn/tsconfig.json",
]

[tasks."check:deno"]
description = "Run transitional Deno linting and type checking"
run = ["deno lint", "deno check ."]

[tasks.fmt]
description = "Format source and Markdown files"
run = ["pnpm exec oxfmt .", "hongdown --write"]

[tasks.test]
description = "Run the Node.js and Deno test suites"
run = ["mise run test:node", "mise run test:deno"]

[tasks."test:node"]
description = "Run the Node.js test suite"
shell = "bash -c"
run = '''
test_args=(
  --import temporal-polyfill/global
  --test
  --test-concurrency=8
  "ai/**/*.test.ts"
  "federation/**/*.test.ts"
  "graphql/**/*.test.ts"
  "models/**/*.test.ts"
  "runtime/**/*.test.ts"
  "scripts/**/*.test.ts"
  "test/**/*.test.ts"
  "web-next/lint-plugins/**/*.test.ts"
  "web-next/src/**/*.test.ts"
)
if test -f .env.test; then
  godotenv -f .env.test -o node "${test_args[@]}"
else
  node "${test_args[@]}"
fi
'''

[tasks."test:deno"]
description = "Run the transitional Deno test suite"
run = '''
if (".env.test" | path exists) {
  godotenv -f .env.test -o deno test --allow-all --parallel
} else {
  deno test --allow-all --parallel
}
'''
shell = "nu -c"

[tasks."dev:graphql"]
description = "Run the GraphQL server in development mode"
run = "deno task dev"
dir = "graphql"

[tasks."dev:graphql:node"]
description = "Run the candidate Node.js GraphQL server in development mode"
run = "node --watch --enable-source-maps --import temporal-polyfill/global --import ./instrument.node.ts main.node.ts --allow-file-kv"
dir = "graphql"

[tasks."dev:graphql-worker"]
description = "Run the GraphQL federation queue worker in development mode"
run = "deno task dev:worker"
dir = "graphql"

[tasks."dev:web-next"]
description = "Run the web-next stack in development mode"
run = "pnpm dev"
dir = "web-next"

[tasks."build:web-next"]
description = "Build the web-next stack"
run = "pnpm build"
dir = "web-next"

[tasks."prod:graphql"]
description = "Start the GraphQL server in production"
run = "deno task start"
dir = "graphql"

[tasks."prod:graphql:node"]
description = "Start the candidate Node.js GraphQL server in production"
run = "node --enable-source-maps --import temporal-polyfill/global --import ./instrument.node.ts main.node.ts"
dir = "graphql"

[tasks."prod:graphql-worker"]
description = "Start the GraphQL federation queue worker in production (no HTTP; do not put behind a load balancer)"
run = "deno task worker"
dir = "graphql"

[tasks."prod:web-next"]
description = "Start the web-next stack in production"
run = "node --enable-source-maps --import ./instrument.server.mjs .output/server/index.mjs"
dir = "web-next"

[tasks."prod:hc:graphql"]
description = "Health check the GraphQL server with a __typename query"
run = '''
const response = await fetch("http://127.0.0.1:8080/graphql", {
  method: "POST",
  headers: { "content-type": "application/json" },
  body: JSON.stringify({ query: "{__typename}" }),
});
if (!response.ok) Deno.exit(1);
const result = await response.json();
if (result.errors || result.data?.__typename !== "Query") Deno.exit(1);
'''
shell = "deno eval"

[tasks."prod:hc:graphql-worker"]
description = "Health check the GraphQL worker heartbeat"
run = '''
import {
  checkWorkerHeartbeat,
  resolveWorkerHealthFile,
} from "./graphql/worker-health.ts";
const path = resolveWorkerHealthFile(Deno.env.get("WORKER_HEALTH_FILE"));
if (!await checkWorkerHeartbeat(path)) Deno.exit(1);
'''
shell = "deno eval"

[tasks."prod:hc:web-next"]
description = "Health check the web-next stack"
run = '''
const response = await fetch("http://127.0.0.1:3000/search");
if (!response.ok) Deno.exit(1);
'''
shell = "deno eval"

[tasks."smoke:standalone"]
description = "Smoke test the standalone GraphQL, worker, and web-next topology"
run = "deno run --allow-all scripts/smoke-standalone.ts"

[tasks.migrate]
description = "Run database migrations"
run = "deno run -A drizzle-kit migrate"

[tasks."migrate:media"]
description = "Copy legacy filesystem uploads into the configured application directory"
run = "node scripts/migrate-media.ts"

[tasks."migrate:generate"]
description = "Generate a new database migration"
run = "deno run -A drizzle-kit generate"

[tasks."migrate:test"]
description = "Run database migrations against the test database"
run = "godotenv -f .env.test -o deno run -A drizzle-kit migrate"

[tasks.keygen]
description = "Generate an instance actor key pair (prints a JWK to stdout)"
run = "deno run --allow-read --allow-env scripts/keygen.ts"

[tasks."generate-vapid-keys"]
description = "Generate Web Push VAPID keys for WEB_PUSH_VAPID_*_KEY"
run = "deno run --allow-env --allow-read scripts/generate-vapid-keys.ts"

[tasks.addaccount]
description = "Create a user account from the command line"
run = "node --import temporal-polyfill/global scripts/addaccount.ts"

[tasks."repair:link-previews"]
description = "Repair posts grouped under malformed link-preview URLs"
run = "deno run --allow-all --env-file=.env scripts/repair-link-previews.ts"
